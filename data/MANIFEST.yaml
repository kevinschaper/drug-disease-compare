# Pinned inputs for the MEDIC vs Drug Approvals KP comparison.
# Regenerate checksums after `just fetch`; commit this file so the comparison is
# reproducible. The large input files themselves live under data/inputs/ and are
# gitignored.
inputs:
  medic_edges:
    description: >-
      Monarch medic-ingest indication edges (drug -> disease, biolink:treats),
      now KGX JSONL with one edge per drug-disease pair (~10,942 edges). Built from
      three regulators' approval documents -- FDA (DailyMed), EMA (EPAR), PMDA --
      each carried as a Biolink RetrievalSource supporting_data_source
      (infores:dailymed/:ema/:pmda) with verbatim [FDA]/[EMA]/[PMDA] indication text
      in supporting_text. Diseases normalized to MONDO via MONDO SSSOM exact match;
      drugs via SRI Node Normalizer (pre-norm ids kept as original_subject/object).
      Every edge cites PMID:41385096 (the MeDIC paper, Nucleic Acids Research
      2026;54(D1):D1477-D1487) as a blanket source, not per-edge literature. The
      TSV export was dropped from releases (local `just export-tsv` only).
    url: https://github.com/monarch-initiative/medic-ingest/releases/download/2026-06-19/medic_indication_edges.jsonl
    filename: medic_edges.jsonl
    release: "2026-06-19"
    medic_version: "1.3.0"
    mondo_sssom_version: "v2026-06-02"
    node_norm_version: "2025sep1"
    sha256: 8d92b96da800dac9e537558fb3767934d0df3836ebb250eb72ea945087fa319d

  dakp_kgx:
    description: >-
      Multiomics Drug Approvals KP KGX release (infores:multiomics-drugapprovals).
      Primary source FAERS adverse-event reports, supported by DailyMed; edges
      carry clinical_approval_status (approved_for_condition vs off_label_use) and
      number_of_cases. Predicates: biolink:applied_to_treat (majority),
      biolink:treats, biolink:contraindicated_in. The zstd tarball expands to
      edges.jsonl (-> dakp_edges.jsonl) and nodes.jsonl (-> dakp_nodes.jsonl).
    url: https://kgx-storage.rtx.ai/releases/dakp/2026_04_21/dakp.tar.zst
    filename: dakp.tar.zst
    release: "2026_04_21"
    build_version: dakp_0.5.3_c3f74ab4_2025sep1_4.3.6
    node_norm_version: "2025sep1"
    biolink_version: "4.3.6"
    sha256: a8e351668f58b188bddf9728d60db40fcc12002881e4f04d5dccb8276b08164c

  dismech_edges:
    description: >-
      Monarch dismech KGX edges (mechanism-driven, curated, LLM-extracted with
      human validation). Of ~38k edges, the 7,424 treatment->disease edges
      (predicate biolink:treats_or_applied_or_studied_to_treat) span MAXO medical
      actions, NCIT, and CHEBI; only the CHEBI drug subset (~1,173 edges, 447
      drugs) is comparable to MEDIC/DAKP and is kept via the reconciler's drug
      filter. Edges carry real per-edge publications + supporting_text.
    url: https://github.com/monarch-initiative/dismech/releases/download/v0.1.30/dismech_edges.jsonl
    filename: dismech_edges.jsonl
    release: v0.1.30
    sha256: 6124e06d394697915f4afc5dbbcac864fa8cff8627d1d69a0af3d65be261ce7e

  mondo_graph:
    description: >-
      MONDO is-a graph for disease-axis closure, taken from the release KGX
      nodes/edges. Direct biolink:subclass_of edges between MONDO terms; ancestors
      and descendants are the transitive closure. Lets a DAKP edge on a grouping
      disease be reconciled with a MEDIC edge on its subtype (and vice versa).
    mondo_release: latest
    edges:
      url: https://github.com/monarch-initiative/mondo/releases/latest/download/mondo_edges.tsv
      filename: mondo_edges.tsv
      sha256: 01e7d924d93fa1cf25027a05c6dbf78e764ac5ee8b1cbe2446b5d187aca4cee5
    nodes:
      url: https://github.com/monarch-initiative/mondo/releases/latest/download/mondo_nodes.tsv
      filename: mondo_nodes.tsv
      sha256: f7614a7de9748f2d1672bc5885362a281b7edfebb3fc0ccb9975431813cb2c69

  node_normalizer:
    description: >-
      SRI Node Normalizer, queried at build time to (a) canonicalize drugs to a
      single clique-preferred CURIE and (b) de-conflate the disease axis: for each
      disease CURIE we take the full clique and prefer its MONDO member, falling
      back to the original term (often HP) only when the clique contains no MONDO.
      This is what undoes the MONDO/HP same-name conflation MONDO-centrically.
      Responses are cached to data/nodenorm_cache.json (gitignored).
    endpoint: https://nodenormalization-sri.renci.org/get_normalized_nodes
    conflate: true
    drug_chemical_conflate: true

  drug_groups:
    description: >-
      Drug-axis collapse, queried at build time (toggle with cli build
      --no-drug-collapse). The Node Normalizer keeps a prodrug/salt/stereoisomer
      separate from its parent, so the same drug recorded two ways reads as a
      disagreement. Each canonical drug is mapped to its FDA/GSRS active moiety
      (pivoting on UNII, recovered via RxNorm when a clique lacks one), with an
      ion guard that rejects moieties of <3 heavy atoms (bare metal cations, NO)
      to avoid over-merging therapeutically distinct salts. This is a flagged,
      experiment-derived inference surfaced separately (drug_group / n_group /
      drug_note), NEVER folded into exact agreement. Compared against RxNorm
      ingredient and ChEBI functional-parent in experiments/drug_collapse.py;
      active moiety chosen for coverage + lowest false-merge rate. Responses
      cached to data/drug_groups_cache.json (gitignored).
    active_moiety: https://gsrs.ncats.nih.gov/api/v1/substances
    rxnorm: https://rxnav.nlm.nih.gov/REST
    chebi_ols: https://www.ebi.ac.uk/ols4/api
    min_moiety_heavy_atoms: 3
